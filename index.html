<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify 实时歌词同步 (PKCE 模式)</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: rgba(255, 255, 255, 0.3);
            --active-color: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧：专辑封面和歌曲信息 */
        .player-info {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, #121212 0%, #050505 100%);
        }

        .album-art {
            width: 280px;
            height: 280px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            background-size: cover;
            transition: all 0.5s ease;
        }

        .track-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            text-align: center;
            padding: 0 20px;
        }

        .artist-name {
            font-size: 1.1rem;
            color: #b3b3b3;
        }

        /* 右侧：歌词容器 */
        .lyric-container {
            width: 60%;
            height: 100vh;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent 0%, white 15%, white 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 15%, white 85%, transparent 100%);
        }

        .lyric-wrapper {
            position: absolute;
            width: 100%;
            padding-left: 10%;
            box-sizing: border-box;
            top: 45%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }

        .lyric-line {
            padding: 18px 0;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            transition: all 0.4s ease;
            transform-origin: left center;
        }

        .lyric-line.active {
            color: var(--active-color);
            transform: scale(1.05);
        }

        /* 登录按钮 */
        #login-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        #login-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <button id="login-btn" onclick="login()">连接 Spotify</button>

    <!-- 歌曲信息展示 -->
    <div class="player-info">
        <div class="album-art" id="albumArt" style="background-image: url('https://via.placeholder.com/280');"></div>
        <div class="track-name" id="trackName">未在播放</div>
        <div class="artist-name" id="artistName">请先连接账号并在 Spotify 客户端放歌</div>
    </div>

    <!-- 歌词滚动区域 -->
    <div class="lyric-container" id="lyricContainer">
        <div class="lyric-wrapper" id="lyricWrapper">
            <div class="lyric-line active">歌词将在此处实时同步显示</div>
        </div>
    </div>

    <script>
        // === 配置项 ===
        const clientId = '4be054489dd84fb092a85cdcab057c5e'; 
        // 动态获取当前网页地址作为回调地址（结尾不含 hash 和 query）
        const redirectUri = window.location.origin + window.location.pathname; 
        const scopes = 'user-read-currently-playing user-read-playback-state';

        let accessToken = null;
        let refreshToken = null;
        let currentTrackId = null;
        let lyrics = [];
        let isPlaying = false;
        let localProgressMs = 0; 
        let lastUpdateTime = 0;  

        // ==========================================
        // PKCE 辅助加密函数 (纯前端实现 SHA-256)
        // ==========================================
        function generateRandomString(length) {
            let text = '';
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            for (let i = 0; i < length; i++) {
                text += possible.charAt(Math.floor(Math.random() * possible.length));
            }
            return text;
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        // ==========================================
        // 1. Spotify 授权登录 (PKCE 流程)
        // ==========================================
        async function login() {
            const codeVerifier = generateRandomString(64);
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            
            // 将 codeVerifier 存入本地，后续换取 Token 时需要校验
            window.localStorage.setItem('code_verifier', codeVerifier);

            const params = new URLSearchParams({
                response_type: 'code', // 👈 按照要求改为 code
                client_id: clientId,
                scope: scopes,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                redirect_uri: redirectUri,
                show_dialog: 'true'
            });

            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        }

        // ==========================================
        // 2. 解析 URL 参数并通过 code 兑换 Token
        // ==========================================
        async function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            // 如果本地已有令牌，直接使用
            const storedToken = window.localStorage.getItem('access_token');
            const storedRefreshToken = window.localStorage.getItem('refresh_token');
            if (storedToken) {
                accessToken = storedToken;
                refreshToken = storedRefreshToken;
                onLoginSuccess();
                return;
            }

            // 如果 URL 中有授权码，开始兑换 Token
            if (code) {
                const codeVerifier = window.localStorage.getItem('code_verifier');
                
                // 清理 URL 中的 query 参数，保持页面整洁
                window.history.replaceState({}, document.title, window.location.pathname);

                try {
                    const response = await fetch('https://accounts.spotify.com/api/token', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({
                            client_id: clientId,
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: redirectUri,
                            code_verifier: codeVerifier,
                        }),
                    });

                    const data = await response.json();
                    if (data.access_token) {
                        handleTokenResponse(data);
                    }
                } catch (err) {
                    console.error('兑换 Token 失败:', err);
                }
            }
        }

        function handleTokenResponse(data) {
            accessToken = data.access_token;
            if (data.refresh_token) {
                refreshToken = data.refresh_token;
                window.localStorage.setItem('refresh_token', refreshToken);
            }
            window.localStorage.setItem('access_token', accessToken);
            
            // 设定在过期前提前刷新（Spotify token 默认 3600 秒过期）
            const expiresIn = data.expires_in || 3600;
            setTimeout(refreshAccessToken, (expiresIn - 60) * 1000);

            onLoginSuccess();
        }

        // ==========================================
        // 3. 自动刷新 Access Token
        // ==========================================
        async function refreshAccessToken() {
            if (!refreshToken) return;
            try {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        grant_type: 'refresh_token',
                        refresh_token: refreshToken,
                        client_id: clientId,
                    }),
                });

                const data = await response.json();
                if (data.access_token) {
                    handleTokenResponse(data);
                    console.log('Token 已自动刷新');
                }
            } catch (err) {
                console.error('刷新 Token 失败:', err);
            }
        }

        function onLoginSuccess() {
            document.getElementById('login-btn').innerText = "已连接 ✅";
            startPolling();
            startLocalTimer();
        }

        // ==========================================
        // 4. 轮询播放状态 & 歌词同步控制 (同之前逻辑)
        // ==========================================
        async function fetchSpotifyState() {
            if (!accessToken) return;
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (response.status === 204) return; // 无活跃播放设备
                if (response.status === 401) {
                    // Token 过期，尝试刷新
                    await refreshAccessToken();
                    return;
                }

                const data = await response.json();
                if (!data || !data.item) return;

                const track = data.item;
                isPlaying = data.is_playing;
                localProgressMs = data.progress_ms;
                lastUpdateTime = Date.now();

                if (track.id !== currentTrackId) {
                    currentTrackId = track.id;
                    updateUI(track);
                    await getLyrics(track.name, track.artists[0].name);
                }
            } catch (err) {
                console.error('获取状态错误:', err);
            }
        }

        function updateUI(track) {
            document.getElementById('trackName').innerText = track.name;
            document.getElementById('artistName').innerText = track.artists.map(a => a.name).join(', ');
            document.getElementById('albumArt').style.backgroundImage = `url(${track.album.images[0].url})`;
        }

        async function getLyrics(trackName, artistName) {
            document.getElementById('lyricWrapper').innerHTML = '<div class="lyric-line active">正在搜索歌词...</div>';
            lyrics = [];
            
            try {
                const url = `https://lrclib.net/api/get?artist_name=${encodeURIComponent(artistName)}&track_name=${encodeURIComponent(trackName)}`;
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data.syncedLyrics) {
                        parseLrc(data.syncedLyrics);
                        renderLyrics();
                        return;
                    }
                }
                document.getElementById('lyricWrapper').innerHTML = '<div class="lyric-line active">暂无同步歌词</div>';
            } catch (e) {
                document.getElementById('lyricWrapper').innerHTML = '<div class="lyric-line active">歌词加载失败</div>';
            }
        }

        function parseLrc(lrcStr) {
            const lines = lrcStr.split('\n');
            const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            lyrics = [];

            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const ms = parseInt(match[3]);
                    const msAdjust = match[3].length === 2 ? ms * 10 : ms;
                    const time = minutes * 60 * 1000 + seconds * 1000 + msAdjust;
                    const text = line.replace(timeReg, '').trim();
                    if (text) lyrics.push({ time, text });
                }
            });
        }

        function renderLyrics() {
            const lyricWrapper = document.getElementById('lyricWrapper');
            lyricWrapper.innerHTML = lyrics.map((item, index) => {
                return `<div class="lyric-line" id="line-${index}">${item.text}</div>`;
            }).join('');
        }

        function startLocalTimer() {
            function update() {
                if (isPlaying && lastUpdateTime > 0) {
                    const now = Date.now();
                    const delta = now - lastUpdateTime;
                    const estimatedProgress = localProgressMs + delta;
                    syncLyrics(estimatedProgress);
                }
                requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        const lyricContainer = document.getElementById('lyricContainer');
        const lyricWrapper = document.getElementById('lyricWrapper');

        function syncLyrics(currentProgressMs) {
            if (lyrics.length === 0) return;

            let activeIndex = -1;
            for (let i = 0; i < lyrics.length; i++) {
                if (currentProgressMs >= lyrics[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }

            if (activeIndex !== -1) {
                const activeElements = lyricWrapper.querySelectorAll('.lyric-line.active');
                activeElements.forEach(el => el.classList.remove('active'));

                const activeLine = document.getElementById(`line-${activeIndex}`);
                if (activeLine) {
                    activeLine.classList.add('active');

                    const containerHeight = lyricContainer.clientHeight;
                    const lineOffsetTop = activeLine.offsetTop;
                    const lineHeight = activeLine.clientHeight;
                    
                    const offset = -(lineOffsetTop - containerHeight * 0.45 + lineHeight / 2);
                    lyricWrapper.style.transform = `translateY(${offset}px)`;
                }
            }
        }

        function startPolling() {
            fetchSpotifyState();
            setInterval(fetchSpotifyState, 2000); 
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
