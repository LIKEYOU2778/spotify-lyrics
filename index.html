<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Music 沉浸式歌词同步</title>
    <style>
        :root {
            /* 深色模式变量 */
            --bg-base: #0a0a0a;
            --text-normal: rgba(255, 255, 255, 0.28);
            --text-active: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: rgba(0, 0, 0, 0.5);
            --text-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
            --blob-opacity: 0.45;
            
            /* 歌词动态行间距变量 */
            --line-padding: 20px;
        }

        .light-theme {
            /* 浅色模式变量 */
            --bg-base: #f5f5f7;
            --text-normal: rgba(0, 0, 0, 0.35);
            --text-active: #000000;
            --glass-bg: rgba(0, 0, 0, 0.04);
            --glass-border: rgba(0, 0, 0, 0.06);
            --shadow: rgba(0, 0, 0, 0.08);
            --text-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --blob-opacity: 0.35;
        }

        /* 彻底移除移动端点击蓝框、聚焦虚线 */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-user-drag: none;
            outline: none !important;
        }

        body {
            margin: 0;
            background-color: var(--bg-base);
            color: var(--text-normal);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            transition: background-color 0.8s ease;
        }

        /* Apple Music 极光离屏交替流动背景 */
        .ambient-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
            background-color: var(--bg-base);
            transition: background-color 0.8s ease;
        }

        .bg-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            filter: blur(80px); 
            transform: scale(1.15); 
            transition: opacity 2s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: opacity;
        }

        .bg-layer.active {
            opacity: var(--blob-opacity);
        }

        .blob {
            position: absolute;
            width: 100vmax;
            height: 100vmax;
            border-radius: 50%;
            will-change: transform;
        }

        .layer-1 .blob-1 { background-color: #2e1c4e; animation: fluidMove1 30s infinite alternate linear; }
        .layer-1 .blob-2 { background-color: #122c4e; animation: fluidMove2 35s infinite alternate linear; }
        .layer-1 .blob-3 { background-color: #4e1c2e; animation: fluidMove3 28s infinite alternate linear; }
        .layer-1 .blob-4 { background-color: #124e3c; animation: fluidMove4 33s infinite alternate linear; }

        .layer-2 .blob-1 { background-color: #2e1c4e; animation: fluidMove1 30s infinite alternate linear; }
        .layer-2 .blob-2 { background-color: #122c4e; animation: fluidMove2 35s infinite alternate linear; }
        .layer-2 .blob-3 { background-color: #4e1c2e; animation: fluidMove3 28s infinite alternate linear; }
        .layer-2 .blob-4 { background-color: #124e3c; animation: fluidMove4 33s infinite alternate linear; }

        @keyframes fluidMove1 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(12%, 8%) scale(1.05) rotate(90deg); }
            100% { transform: translate(-5%, -12%) scale(0.95) rotate(180deg); }
        }

        @keyframes fluidMove2 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(-8%, -12%) scale(0.9) rotate(-120deg); }
            100% { transform: translate(12%, 5%) scale(1.02) rotate(240deg); }
        }

        @keyframes fluidMove3 {
            0% { transform: translate(0, 0) scale(1.02) rotate(0deg); }
            50% { transform: translate(5%, -15%) scale(0.95) rotate(60deg); }
            100% { transform: translate(-12%, 8%) scale(1.08) rotate(120deg); }
        }

        @keyframes fluidMove4 {
            0% { transform: translate(0, 0) scale(0.95) rotate(0deg); }
            50% { transform: translate(-12%, 12%) scale(1.05) rotate(-80deg); }
            100% { transform: translate(8%, -5%) scale(0.98) rotate(160deg); }
        }

        /* 主布局 */
        .main-layout {
            display: flex;
            width: 100%;
            height: 100vh;
            z-index: 10;
        }

        /* ==========================================
           左栏控制面板 (电脑端保持高雅分栏，不影响大屏体验)
           ========================================== */
        .player-panel {
            width: 38%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            position: relative;
        }

        .album-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 25px;
            perspective: 1000px;
        }

        .album-art {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 45px var(--shadow);
            cursor: pointer;
            transform-origin: center center;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.3, 1.1), box-shadow 0.8s ease;
        }

        .album-art.vinyl {
            border-radius: 50% !important;
            animation: rotateRecord 20s linear infinite;
            transform: scale(1.1) rotate(0deg);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7), 
                        inset 0 0 0 8px rgba(0,0,0,0.9),
                        inset 0 0 0 10px rgba(255,255,255,0.05);
        }

        @keyframes rotateRecord {
            from { transform: scale(1.1) rotate(0deg); }
            to { transform: scale(1.1) rotate(360deg); }
        }

        .track-metadata {
            text-align: center;
            max-width: 95%;
            margin-bottom: 25px;
        }

        .track-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-active);
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            text-shadow: var(--text-shadow);
        }

        .artist-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-normal);
            margin: 0;
        }

        .control-bar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
            max-width: 320px;
        }

        .buttons-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-active);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 10px 18px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--shadow);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: transform 0.2s ease, background-color 0.8s ease, color 0.8s ease;
        }

        .btn:hover {
            transform: scale(1.04) translateY(-1px);
            background: rgba(255, 255, 255, 0.12);
        }

        .spacing-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 0.8rem;
            color: var(--text-active);
            box-shadow: 0 4px 15px var(--shadow);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            justify-content: space-between;
        }

        .spacing-control input[type="range"] {
            flex-grow: 1;
            height: 4px;
            background: var(--text-normal);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .spacing-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-active);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* ==========================================
           右侧歌词面板
           ========================================== */
        .lyric-panel {
            width: 62%;
            height: 100vh;
            overflow-y: scroll; 
            position: relative;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
            mask-image: linear-gradient(to bottom, transparent 0%, white 8%, white 92%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 8%, white 92%, transparent 100%);
        }

        .lyric-panel::-webkit-scrollbar {
            display: none; 
        }

        .lyric-wrapper {
            width: 100%;
            padding-left: 5%;
            padding-right: 15%;
            box-sizing: border-box;
            padding-top: 35vh; 
            padding-bottom: 55vh;
        }

        .lyric-line {
            padding: var(--line-padding) 0;
            font-size: 2.1rem;
            font-weight: 800;
            line-height: 1.35;
            letter-spacing: -0.8px;
            transition: padding 0.3s ease, color 0.5s ease, transform 0.5s ease, opacity 0.5s ease, filter 0.5s ease;
            transform-origin: left center;
            filter: blur(1.5px);
            opacity: 0.25;
            cursor: pointer;
        }

        .lyric-line:hover {
            opacity: 0.65;
            filter: blur(0);
        }

        .lyric-line.active {
            color: var(--text-active);
            opacity: 1;
            filter: blur(0);
            transform: scale(1.04);
            text-shadow: var(--text-shadow);
        }

        /* ==========================================
           📱 智能自适应重构（手机竖屏彻底释放空间）
           ========================================== */
        @media (max-width: 768px) and (orientation: portrait) {
            body { flex-direction: column; }
            .main-layout { flex-direction: column; }
            
            /* 1. 顶部状态栏高度仅 70px，变身极简横条 */
            .player-panel {
                width: 100%;
                height: 70px; 
                flex-direction: row; /* 横向流式排布 */
                justify-content: space-between;
                align-items: center;
                padding: 0 16px;
                border-bottom: 1px solid var(--glass-border);
                background: var(--glass-bg);
                backdrop-filter: blur(25px);
                -webkit-backdrop-filter: blur(25px);
                position: absolute;
                top: 0;
                left: 0;
                z-index: 100;
            }

            /* 2. 专辑封面挪到【右上角】 */
            .album-container { 
                width: 44px; 
                height: 44px; 
                margin-bottom: 0; 
                order: 3; /* 排在最右 */
            }
            .album-art.vinyl { 
                transform: scale(1.05) rotate(0deg); 
            }
            @keyframes rotateRecord {
                from { transform: scale(1.05) rotate(0deg); }
                to { transform: scale(1.05) rotate(360deg); }
            }

            /* 3. 歌曲信息放置在【中间】 */
            .track-metadata { 
                margin-bottom: 0; 
                text-align: center;
                flex: 1;
                padding: 0 10px;
                order: 2; /* 居中 */
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .track-name { 
                font-size: 0.95rem; 
                margin-bottom: 1px; 
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .artist-name { 
                font-size: 0.72rem; 
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            /* 4. 控制集合在【左上角】，极度紧凑 */
            .control-bar { 
                order: 1; /* 排在最左 */
                width: auto;
                flex-direction: row; 
                gap: 5px;
            }
            .buttons-row {
                flex-wrap: nowrap;
                gap: 4px;
            }
            .btn { 
                padding: 6px 8px; 
                font-size: 0.7rem; 
            }

            /* 极简行间距拖动条，去掉文字以节省空间 */
            .spacing-control {
                padding: 4px;
                background: none;
                border: none;
                box-shadow: none;
                width: auto;
            }
            .spacing-control span {
                display: none; /* 隐藏 “↕️ 间距” 文本 */
            }
            .spacing-control input[type="range"] {
                width: 45px; /* 窄拉条 */
            }

            /* 5. 歌词区域拉满 100% 视口（减去头部 70px） */
            .lyric-panel { 
                width: 100%; 
                height: calc(100vh - 70px); 
                position: absolute;
                top: 70px;
                left: 0;
            }
            .lyric-wrapper { 
                padding-left: 8%; 
                padding-right: 8%; 
                padding-top: 15vh; /* 黄金对齐点 */
                padding-bottom: 45vh;
            }
            .lyric-line { 
                font-size: 1.6rem; 
            }
        }

        /* 手机横屏自适应 */
        @media (max-height: 500px) and (orientation: landscape) {
            .player-panel { width: 35%; padding: 10px; }
            .album-container { width: 100px; height: 100px; margin-bottom: 6px; }
            .track-metadata { margin-bottom: 6px; }
            .track-name { font-size: 1rem; }
            .artist-name { font-size: 0.8rem; }
            .control-bar { gap: 6px; }
            .btn { padding: 6px 12px; font-size: 0.7rem; }
            .lyric-panel { width: 65%; }
            .lyric-line { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <!-- 极光离屏交替流动背景 -->
    <div class="ambient-background">
        <!-- 图层 1 -->
        <div class="bg-layer layer-1 active" id="layer1">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
        </div>
        <!-- 图层 2 -->
        <div class="bg-layer layer-2" id="layer2">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧控制台（手机上变为顶部轻巧导航栏） -->
        <div class="player-panel">
            <div class="album-container">
                <div class="album-art" id="albumArt" onclick="toggleAlbumAnimation()" style="background-image: url('https://via.placeholder.com/320');"></div>
            </div>
            <div class="track-metadata">
                <h1 class="track-name" id="trackName">准备就绪</h1>
                <p class="artist-name" id="artistName">连接账号或进行测试</p>
            </div>
            
            <div class="control-bar">
                <div class="buttons-row">
                    <button class="btn" onclick="toggleTheme()">🌓</button>
                    <button class="btn" id="login-btn" onclick="login()">🔗</button>
                    <button class="btn" id="demo-btn" onclick="toggleDemoMode()">🧪</button>
                </div>
                <div class="spacing-control">
                    <span>↕️</span>
                    <input type="range" id="spacingSlider" min="10" max="40" value="20" oninput="adjustSpacing(this.value)">
                </div>
            </div>
        </div>

        <!-- 右侧歌词 -->
        <div class="lyric-panel" id="lyricContainer">
            <div class="lyric-wrapper" id="lyricWrapper">
                <div class="lyric-line active">歌词将在此处伴随苹果动效实时同步</div>
            </div>
        </div>
    </div>

    <script>
        // === 配置项 ===
        const clientId = '4be054489dd84fb092a85cdcab057c5e'; 
        const redirectUri = window.location.origin + window.location.pathname; 
        const scopes = 'user-read-currently-playing user-read-playback-state user-modify-playback-state';

        let accessToken = null;
        let refreshToken = null;
        let currentTrackId = null;
        let lyrics = [];
        let isPlaying = false;
        let localProgressMs = 0; 
        let lastUpdateTime = 0;  

        let isUserScrolling = false;
        let userScrollTimeout = null;

        // 双图层交替变量
        let activeLayer = 1;

        // 本地测试（Demo）相关变量
        let isDemoMode = false;
        const mockTrack = {
            name: "WDA (Whole Different Animal)",
            artists: [{ name: "aespa, G-DRAGON" }],
            album: { images: [{ url: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400&q=80" }] }
        };
        const mockLrc = `
        [00:00.00] 欢迎体验全新设计的极简布局 🧪
        [00:03.00] 顶部高度被压缩到仅 70 像素
        [00:06.00] 左上角集合了：🌓换色、🔗连接和🧪测试
        [00:10.00] 还有迷你行距滑动条，方便你随时微调
        [00:14.00] 专辑封面乖巧地置于右上角自转
        [00:18.00] 全屏 92% 的面积现在全部让位给歌词！
        [00:22.00] Iced up but furious, my scars, so glorious
        [00:26.00] She's a whole different animal, different animal
        [00:30.00] 拖拽或者上下滑动歌词区域
        [00:34.00] 滚动对焦会暂停 5 秒钟
        [00:38.00] 随后自动且优雅地回弹到当前这句
        [00:42.00] 点击任意一句歌词，进度会自动跳转
        [00:46.00] 享受这块纯净、无遮挡的大屏幕吧！
        [00:51.00] (测试即将重新循环播放...)
        `;

        // ==========================================
        // 核心交互与自定义功能
        // ==========================================
        function toggleAlbumAnimation() {
            document.getElementById('albumArt').classList.toggle('vinyl');
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            localStorage.setItem('preferred-theme', body.classList.contains('light-theme') ? 'light' : 'dark');
        }

        if (localStorage.getItem('preferred-theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        function adjustSpacing(value) {
            document.documentElement.style.setProperty('--line-padding', value + 'px');
        }

        // ==========================================
        // 🧪 一键本地测试 Demo 逻辑
        // ==========================================
        function toggleDemoMode() {
            if (isDemoMode) {
                location.reload(); 
                return;
            }
            
            isDemoMode = true;
            isPlaying = true;
            localProgressMs = 0;
            lastUpdateTime = Date.now();
            
            document.getElementById('demo-btn').innerText = "🧪";
            document.getElementById('demo-btn').style.borderColor = "#1DB954";
            document.getElementById('demo-btn').style.color = "#1DB954";
            
            updateUI(mockTrack);
            parseLrc(mockLrc);
            renderLyrics();
            
            startLocalTimer();
            setupDragListeners();
        }

        // ==========================================
        // 🎨 极光双图层无感取色过渡
        // ==========================================
        async function extractAndApplyColors(imageUrl) {
            try {
                const colors = await getPaletteFromUrl(imageUrl);
                const nextLayerId = activeLayer === 1 ? 'layer2' : 'layer1';
                const nextLayer = document.getElementById(nextLayerId);
                
                const blobs = nextLayer.querySelectorAll('.blob');
                blobs[0].style.backgroundColor = colors[0];
                blobs[1].style.backgroundColor = colors[1];
                blobs[2].style.backgroundColor = colors[2];
                blobs[3].style.backgroundColor = colors[3];
                
                document.getElementById('layer1').classList.toggle('active', nextLayerId === 'layer1');
                document.getElementById('layer2').classList.toggle('active', nextLayerId === 'layer2');
                
                activeLayer = activeLayer === 1 ? 2 : 1;
            } catch (err) {
                console.warn('取色未完成，保留原有极光。');
            }
        }

        function getPaletteFromUrl(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous'; 
                img.src = url;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 10; 
                    canvas.height = 10;
                    ctx.drawImage(img, 0, 0, 10, 10);

                    const imgData = ctx.getImageData(0, 0, 10, 10).data;
                    const colors = [
                        `rgb(${imgData[0]}, ${imgData[1]}, ${imgData[2]})`,
                        `rgb(${imgData[40]}, ${imgData[41]}, ${imgData[42]})`,
                        `rgb(${imgData[120]}, ${imgData[121]}, ${imgData[122]})`,
                        `rgb(${imgData[200]}, ${imgData[201]}, ${imgData[202]})`
                    ];
                    resolve(colors);
                };
                img.onerror = (err) => reject(err);
            });
        }

        // ==========================================
        // 歌词点击跳转
        // ==========================================
        async function seekSpotify(timeMs) {
            if (isDemoMode) {
                localProgressMs = timeMs;
                lastUpdateTime = Date.now();
                isUserScrolling = false;
                return;
            }
            if (!accessToken) return;
            try {
                await fetch(`https://api.spotify.com/v1/me/player/seek?position_ms=${timeMs}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                localProgressMs = timeMs;
                lastUpdateTime = Date.now();
                isUserScrolling = false; 
            } catch (err) {
                console.error('Spotify 跳转失败:', err);
            }
        }

        // ==========================================
        // PKCE 登录认证
        // ==========================================
        function generateRandomString(length) {
            let text = '';
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            for (let i = 0; i < length; i++) {
                text += possible.charAt(Math.floor(Math.random() * possible.length));
            }
            return text;
        }

        async function generateCodeChallenge(codeVerifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        async function login() {
            const codeVerifier = generateRandomString(64);
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            window.localStorage.setItem('code_verifier', codeVerifier);

            const params = new URLSearchParams({
                response_type: 'code',
                client_id: clientId,
                scope: scopes,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                redirect_uri: redirectUri,
                show_dialog: 'true'
            });

            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        }

        async function checkAuth() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            const storedToken = window.localStorage.getItem('access_token');
            const storedRefreshToken = window.localStorage.getItem('refresh_token');
            if (storedToken) {
                accessToken = storedToken;
                refreshToken = storedRefreshToken;
                onLoginSuccess();
                return;
            }

            if (code) {
                const codeVerifier = window.localStorage.getItem('code_verifier');
                window.history.replaceState({}, document.title, window.location.pathname);

                try {
                    const response = await fetch('https://accounts.spotify.com/api/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({
                            client_id: clientId,
                            grant_type: 'authorization_code',
                            code: code,
                            redirect_uri: redirectUri,
                            code_verifier: codeVerifier,
                        }),
                    });

                    const data = await response.json();
                    if (data.access_token) {
                        handleTokenResponse(data);
                    }
                } catch (err) {
                    console.error('兑换 Token 失败:', err);
                }
            }
        }

        function handleTokenResponse(data) {
            accessToken = data.access_token;
            if (data.refresh_token) {
                refreshToken = data.refresh_token;
                window.localStorage.setItem('refresh_token', refreshToken);
            }
            window.localStorage.setItem('access_token', accessToken);
            
            const expiresIn = data.expires_in || 3600;
            setTimeout(refreshAccessToken, (expiresIn - 60) * 1000);

            onLoginSuccess();
        }

        async function refreshAccessToken() {
            if (!refreshToken) return;
            try {
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'refresh_token',
                        refresh_token: refreshToken,
                        client_id: clientId,
                    }),
                });

                const data = await response.json();
                if (data.access_token) {
                    handleTokenResponse(data);
                }
            } catch (err) {
                console.error('刷新 Token 失败:', err);
            }
        }

        function onLoginSuccess() {
            document.getElementById('login-btn').innerText = "✅";
            startPolling();
            startLocalTimer();
            setupDragListeners(); 
        }

        // ==========================================
        // 手势触拽监听
        // ==========================================
        function setupDragListeners() {
            const container = document.getElementById('lyricContainer');

            const handleUserInteraction = () => {
                isUserScrolling = true;
                clearTimeout(userScrollTimeout);
                userScrollTimeout = setTimeout(() => {
                    isUserScrolling = false;
                }, 5000); 
            };

            container.addEventListener('touchstart', handleUserInteraction, { passive: true });
            container.addEventListener('wheel', handleUserInteraction, { passive: true });
            container.addEventListener('mousedown', handleUserInteraction, { passive: true });
        }

        // ==========================================
        // 轮询与播放同步
        // ==========================================
        async function fetchSpotifyState() {
            if (isDemoMode) return; 
            if (!accessToken) return;
            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (response.status === 204) return;
                if (response.status === 401) {
                    await refreshAccessToken();
                    return;
                }

                const data = await response.json();
                if (!data || !data.item) return;

                const track = data.item;
                isPlaying = data.is_playing;
                localProgressMs = data.progress_ms;
                lastUpdateTime = Date.now();

                if (track.id !== currentTrackId) {
                    currentTrackId = track.id;
                    updateUI(track);
                    await getLyrics(track.name, track.artists[0].name);
                }
            } catch (err) {
                console.error('获取状态错误:', err);
            }
        }

        function updateUI(track) {
            const coverUrl = track.album.images[0].url;
            document.getElementById('trackName').innerText = track.name;
            document.getElementById('artistName').innerText = track.artists.map(a => a.name).join(', ');
            document.getElementById('albumArt').style.backgroundImage = `url(${coverUrl})`;
            
            extractAndApplyColors(coverUrl);
        }

        async function getLyrics(trackName, artistName) {
            document.getElementById('lyricWrapper').innerHTML = '<div class="lyric-line active">正在努力为您加载歌词...</div>';
            lyrics = [];
            
            try {
                const url = `https://lrclib.net/api/get?artist_name=${encodeURIComponent(artistName)}&track_name=${encodeURIComponent(trackName)}`;
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data.syncedLyrics) {
                        parseLrc(data.syncedLyrics);
                        renderLyrics();
                        return;
                    }
                }
                document.getElementById('lyricWrapper').innerHTML = '<div class="lyric-line active">暂无同步歌词 😭</div>';
            } catch (e) {
                document.getElementById('lyricWrapper').innerHTML = '<div class="lyric-line active">网络开小差，请检查连接</div>';
            }
        }

        function parseLrc(lrcStr) {
            const lines = lrcStr.split('\n');
            const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            lyrics = [];

            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const ms = parseInt(match[3]);
                    const msAdjust = match[3].length === 2 ? ms * 10 : ms;
                    const time = minutes * 60 * 1000 + seconds * 1000 + msAdjust;
                    const text = line.replace(timeReg, '').trim();
                    if (text) lyrics.push({ time, text });
                }
            });
        }

        function renderLyrics() {
            const lyricWrapper = document.getElementById('lyricWrapper');
            lyricWrapper.innerHTML = lyrics.map((item, index) => {
                return `<div class="lyric-line" id="line-${index}" onclick="seekSpotify(${item.time})">${item.text}</div>`;
            }).join('');
        }

        function startLocalTimer() {
            function update() {
                if (isPlaying) {
                    const now = Date.now();
                    const delta = now - lastUpdateTime;
                    
                    if (isDemoMode) {
                        localProgressMs += delta;
                        lastUpdateTime = now;
                        if (localProgressMs > 65000) localProgressMs = 0; 
                        syncLyrics(localProgressMs);
                    } else if (lastUpdateTime > 0) {
                        const estimatedProgress = localProgressMs + delta;
                        syncLyrics(estimatedProgress);
                    }
                }
                requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        const lyricContainer = document.getElementById('lyricContainer');
        const lyricWrapper = document.getElementById('lyricWrapper');

        // ==========================================
        // 🎯 核心定位：高光完美切合白圈
        // ==========================================
        function syncLyrics(currentProgressMs) {
            if (lyrics.length === 0) return;

            let activeIndex = -1;
            for (let i = 0; i < lyrics.length; i++) {
                if (currentProgressMs >= lyrics[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }

            if (activeIndex !== -1) {
                const activeElements = lyricWrapper.querySelectorAll('.lyric-line.active');
                activeElements.forEach(el => el.classList.remove('active'));

                const activeLine = document.getElementById(`line-${activeIndex}`);
                if (activeLine) {
                    activeLine.classList.add('active');

                    if (!isUserScrolling) {
                        const containerHeight = lyricContainer.clientHeight;
                        const lineOffsetTop = activeLine.offsetTop;
                        
                        const isMobilePortrait = window.innerWidth <= 768 && window.innerHeight > window.innerWidth;
                        const alignRatio = isMobilePortrait ? 0.23 : 0.38; // 23% 高度完美对焦手机上的黄金视觉白圈
                        
                        const targetScrollTop = lineOffsetTop - containerHeight * alignRatio;
                        
                        lyricContainer.scrollTo({
                            top: targetScrollTop,
                            behavior: 'smooth'
                        });
                    }
                }
            }
        }

        function startPolling() {
            fetchSpotifyState();
            setInterval(fetchSpotifyState, 2000); 
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
